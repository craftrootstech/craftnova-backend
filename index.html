<script>

const API_BASE = "https://craftnova-backend.onrender.com";

// ===== AGENT LOGIC =====
function detectAgent(input) {
  const text = input.toLowerCase();
  if (text.includes("marketing") || text.includes("content")) return "content";
  if (text.includes("data")) return "data";
  if (text.includes("automation")) return "automation";
  return "general";
}

function generateContent(input) {
  return `Marketing Content:\n\n- Hook\n- Body\n- CTA\n\nTopic: ${input}`;
}

function analyzeData(input) {
  return `Data Analysis:\n\nInsights for: ${input}`;
}

function createWorkflow(input) {
  return `Workflow:\n\nSteps for: ${input}`;
}

function executeAgent(agent, input) {
  if (agent === "content") return generateContent(input);
  if (agent === "data") return analyzeData(input);
  if (agent === "automation") return createWorkflow(input);
  return "General response generated.";
}

// ===== AI RUN =====
async function runAI() {
  const input = document.getElementById("prompt");
  const output = document.getElementById("output");

  const text = input.value.trim();
  if (!text) return;

  const agent = detectAgent(text);

  output.innerHTML += `<p class="text-blue-400">> ${text}</p>`;

  const result = executeAgent(agent, text);

  output.innerHTML += `<p class="text-gray-300">${result}</p>`;

  await sendToAPI(result, agent);
  input.value = "";
}

// ===== SEND TO BACKEND =====
async function sendToAPI(content, agent) {
  try {
    await fetch(`${API_BASE}/send-email`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: content, agent })
    });
  } catch (err) {
    console.error("API error:", err);
  }
}

// ===== LEAD =====
async function submitLead() {
  const status = document.getElementById("leadStatus");
  status.innerText = "Sending...";

  const name = document.getElementById("leadName").value;
  const email = document.getElementById("leadEmail").value;
  const business = document.getElementById("leadBusiness").value;

  try {
    const res = await fetch(`${API_BASE}/lead`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, business })
    });

    const data = await res.json();

    status.innerText = "✅ Audit sent successfully!";
    console.log(data);

  } catch (err) {
    status.innerText = "❌ Error sending request";
  }
}

// ===== HISTORY =====
async function loadHistory() {
  const panel = document.getElementById("historyPanel");

  try {
    const res = await fetch(`${API_BASE}/history`);
    const data = await res.json();

    panel.innerHTML = data.map(item => `
      <div class="border-b border-border pb-2">
        <p class="text-primary text-xs">[${item.agent}]</p>
        <p>${item.content}</p>
      </div>
    `).join("");

  } catch {
    panel.innerHTML = "Login required to view history";
  }
}

function clearMemory() {
  document.getElementById("output").innerHTML = "";
}

window.onload = loadHistory;

</script>
