<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>CraftNova Login</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>

    tailwind.config = {

      theme: {

        extend: {

          colors: {

            primary: "#3B82F6",
            bg: "#0B0F1A",
            card: "#111827",
            border: "#1F2937"
          }
        }
      }
    };

  </script>

</head>

<body class="bg-bg min-h-screen flex items-center justify-center p-6 text-white">

<div class="bg-card border border-border rounded-2xl p-8 w-full max-w-md">

  <h1 class="text-3xl font-bold mb-2">
    🔐 CraftNova Login
  </h1>

  <p class="text-gray-400 mb-6">
    Secure Admin Access
  </p>

  <div class="space-y-4">

    <input
      id="email"
      type="email"
      placeholder="Admin Email"
      class="w-full bg-black border border-border rounded-xl p-3 outline-none"
    />

    <input
      id="password"
      type="password"
      placeholder="Password"
      class="w-full bg-black border border-border rounded-xl p-3 outline-none"
    />

    <button
      onclick="login()"
      class="w-full bg-primary hover:opacity-90 transition rounded-xl py-3 font-semibold"
    >
      Login
    </button>

    <p
      id="error"
      class="text-red-400 text-sm"
    ></p>

  </div>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>

<script>

async function login() {

  const email =
    document.getElementById("email").value;

  const password =
    document.getElementById("password").value;

  try {

    const res =
      await fetch(

        `${API_BASE}/admin-login`,

        {

          method: "POST",

          headers: {
            "Content-Type":
              "application/json"
          },

          body: JSON.stringify({
            email,
            password
          })
        }
      );

    const data =
      await res.json();

    if (!data.success) {

      document.getElementById(
        "error"
      ).innerText =
        data.error || "Login failed";

      return;
    }

    setToken(data.token);

    window.location.href =
      "admin.html";

  } catch (err) {

    console.error(err);

    document.getElementById(
      "error"
    ).innerText =
      "Connection failed";
  }
}

// ===== AUTO REDIRECT =====

window.onload = async () => {

  const valid =
    await verifySession();

  if (valid) {

    window.location.href =
      "admin.html";
  }
};

</script>

</body>

</html>
