<svg width="200" height="56" viewBox="0 0 200 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"></stop>
      <stop offset="100%" stop-color="#8B5CF6"></stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Core -->
  <circle cx="28" cy="28" r="6" fill="url(#grad)" filter="url(#glow)"></circle>

  <!-- Outer Ring -->
  <circle cx="28" cy="28" r="14" stroke="url(#grad)" stroke-width="2" opacity="0.9"></circle>

  <!-- Orbit -->
  <ellipse cx="28" cy="28" rx="20" ry="8" stroke="#22D3EE" stroke-width="1.2" opacity="0.6"></ellipse>

  <!-- Text -->
  <text x="60" y="34" fill="#E5E7EB" font-family="Inter, sans-serif" font-size="20" font-weight="600">
    CraftNova
  </text>
</svg>