<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Secure Your Strategy Session</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .box {
      background: #f1f3f5;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 15px;
      background: #ff9800;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #e68900;
    }

    .success {
      color: green;
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Secure Your Strategy Session</h1>

  <div class="box">
    <p><strong>Step 1: Make Payment</strong></p>
    <p>Bank: FNB Namibia</p>
    <p>Account Name: Craftroots Technologies</p>
    <p>Account Number: 123456789</p>
    <p>Reference: Your Business Name</p>
    <p><strong>Amount: N$450</strong></p>
  </div>

  <div class="box">
    <p><strong>Step 2: Submit Proof</strong></p>

    <form id="paymentForm">
      <label>Full Name</label>
      <input type="text" id="name" required />

      <label>Email</label>
      <input type="email" id="email" required />

      <label>Business Name</label>
      <input type="text" id="business" required />

      <label>Payment Reference</label>
      <input type="text" id="reference" required />

      <label>Proof of Payment (link or note)</label>
      <textarea id="proof"></textarea>

      <button type="submit">Submit Payment</button>
    </form>

    <div id="message" class="success"></div>
  </div>
</div>

<script>
document.getElementById("paymentForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    business: document.getElementById("business").value,
    reference: document.getElementById("reference").value,
    proofUrl: document.getElementById("proof").value,
    amount: 450
  };

  try {
    const res = await fetch("https://craftnova-backend.onrender.com/submit-payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.success) {
      document.getElementById("message").innerText =
        "Payment submitted successfully. We will verify and send your booking link shortly.";
    } else {
      document.getElementById("message").innerText = result.error;
    }

  } catch (err) {
    document.getElementById("message").innerText = "Error submitting payment.";
  }
});
</script>

</body>
</html>
